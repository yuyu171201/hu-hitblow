# Nginx: /hitblow/ を内部ポート 8001 へ「そのまま」横流しする。
#
# サブパスの扱いはアプリ側（BASE_PATH=/hitblow）が完結させているので、
# ここではプレフィックスを剥がさない（proxy_pass に末尾 / を付けない）。
# X-Forwarded-Prefix などの特別なヘッダも不要。
#
# 既存の server ブロック（他アプリと同居）の中に、この location を1つ足すだけ。
#
#   sudo cp GUIplay/deploy/nginx-hitblow.conf /etc/nginx/snippets/hitblow.conf
#   # 既存の server { ... } の中で:  include snippets/hitblow.conf;
#   sudo nginx -t && sudo systemctl reload nginx
#
# ドメインが無く IP だけの場合は、既存の server { listen 80; server_name _; ... }
# に取り込めばよい（http://217.142.243.50/hitblow/ でアクセス）。

location /hitblow/ {
    proxy_pass http://127.0.0.1:8001;        # ← 末尾に / を付けない（プレフィックスを保持）

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 対戦は1秒ごとのHTTPポーリング（WebSocket不使用）なので特別な設定は不要。
    # 応答をためこまず素早く返すためのバッファ無効化（任意）
    proxy_buffering off;
}
